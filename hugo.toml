baseURL = 'https://aida-club.github.io/'
languageCode = 'en-us'
title = 'AIDA — AI & Data Analytics Club'
theme = 'PaperMod'
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
pagination.pagerSize = 10

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = 'production'
  title = 'AIDA'
  description = "AI & Data Analytics Club at Ajman University — daily AI/ML digests written for students."
  keywords = ['AI', 'Machine Learning', 'Data Science', 'Ajman University', 'UAE', 'Student Club']
  author = 'AIDA'
  github = 'https://github.com/AhmedKhalid37'
  defaultTheme = 'auto'
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowToc = true
  TocOpen = false

  [params.homeInfoParams]
    Content = '''Daily digests on the AI/ML papers, tools, and updates that matter. Written by students for students.'''

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/aida-club'

[[menu.main]]
  identifier = 'posts'
  name = 'Digests'
  url = '/posts/'
  weight = 10

[[menu.main]]
  identifier = 'weekly'
  name = 'Weekly'
  url = '/tags/weekly-digest/'
  weight = 20

[[menu.main]]
  identifier = 'about'
  name = 'About'
  url = '/about/'
  weight = 30

[[menu.main]]
  identifier = 'join'
  name = 'Join'
  url = '/join/'
  weight = 40

[[menu.main]]
  identifier = 'archive'
  name = 'Archive'
  url = '/archives/'
  weight = 50

[outputs]
  home = ['HTML', 'RSS', 'JSON']
