<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}" dir="{{ if eq (lower .Site.Language.LanguageDirection) "rtl" }}rtl{{ else }}ltr{{ end }}">
<head>
  {{- partial "head.html" . -}}
</head>
<body>
  <div class="aida-stripe"></div>
  {{- partial "header.html" . -}}
  <main class="aida-main">
    {{- block "main" . }}{{- end }}
  </main>
  {{- partial "footer.html" . -}}
</body>
</html>
